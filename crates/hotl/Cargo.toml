[package]
name = "hotl"
description = "A human-on-the-loop tui with byo-keybindings - discovers AI-agent processes, shows their live status, gives an (optional) audible ping when an agent is waiting on your input, jump to pane."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
readme = "README.md"
keywords = ["tmux", "tui", "agent", "dashboard", "cli"]
categories = ["command-line-utilities"]

[[bin]]
name = "hotl"
path = "src/main.rs"

[dependencies]
types = { package = "hotl-types", path = "../hotl-types", version = "0.1.0" }
tmux = { package = "hotl-tmux", path = "../hotl-tmux", version = "0.1.0" }
listener = { package = "hotl-listener", path = "../hotl-listener", version = "0.1.0" }
tui = { package = "hotl-tui", path = "../hotl-tui", version = "0.1.0" }
ratatui = { workspace = true }
crossterm = { workspace = true }
