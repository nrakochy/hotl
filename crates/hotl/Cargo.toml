[package]
name = "hotl"
description = "A terminal dashboard that discovers AI-agent processes in tmux, shows their live status, and jumps focus to them."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
readme = "README.md"
keywords = ["tmux", "tui", "agent", "dashboard", "cli"]
categories = ["command-line-utilities"]

[[bin]]
name = "hotl"
path = "src/main.rs"

[dependencies]
watch_types = { package = "hotl-watch-types", path = "../watch-types", version = "0.1.0" }
watch_tmux = { package = "hotl-watch-tmux", path = "../watch-tmux", version = "0.1.0" }
watch_listener = { package = "hotl-watch-listener", path = "../watch-listener", version = "0.1.0" }
watch_tui = { package = "hotl-watch-tui", path = "../watch-tui", version = "0.1.0" }
ratatui = { workspace = true }
crossterm = { workspace = true }
