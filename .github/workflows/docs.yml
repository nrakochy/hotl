# Deploys the Starlight docs site (site/) to GitHub Pages.
# One-time repo prerequisite: Settings → Pages → Source = "GitHub Actions"
# (creating the Pages site is admin-only; the workflow token can't do it).
#
# Runs when cargo-dist publishes a GitHub Release (see release.yml), building
# the docs from the released tag, and on any master push that touches site/ —
# so the live site tracks master between releases. workflow_dispatch allows a
# manual redeploy from the default branch.
name: Docs

on:
  release:
    types: [published]
  push:
    branches: [master]
    paths: ["site/**", ".github/workflows/docs.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Empty on workflow_dispatch, which falls back to the default branch.
          ref: ${{ github.event.release.tag_name }}
      # Creates the Pages site on first run (enablement) — deploy-pages fails
      # with 404 if the repo has never had Pages configured.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
        working-directory: site
      - run: npm run build
        working-directory: site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
