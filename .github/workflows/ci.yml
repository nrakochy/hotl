name: CI

# Build, test, and lint on every push and pull request. Publishing is a
# separate, tag-triggered workflow (see publish.yml) — this one just keeps the
# default branch green.
#
# Watch and harness run as separate jobs (merge plan 0002 phase 1): a red
# harness must never block a `hotl watch` hotfix, and vice versa. The binary
# crate depends on both, so it builds in the harness job (the bigger tree).
on:
  push:
    branches: ["**"]
    tags-ignore: ["**"] # tag pushes are handled by publish.yml
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: watch
      - name: Clippy (watch crates)
        run: cargo clippy -p hotl-watch-types -p hotl-watch-tmux -p hotl-watch-listener -p hotl-watch-tui --all-targets -- -D warnings
      - name: Test (watch crates)
        run: cargo test -p hotl-watch-types -p hotl-watch-tmux -p hotl-watch-listener -p hotl-watch-tui --locked

  harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: harness
      - name: Clippy (harness crates + binary)
        run: cargo clippy -p hotl-types -p hotl-platform -p hotl-provider -p hotl-provider-anthropic -p hotl-provider-openai -p hotl-tools -p hotl-store -p hotl-context -p hotl-mcp -p hotl-engine -p hotl-testkit -p hotl --all-targets -- -D warnings
      - name: Test (harness crates + binary)
        run: cargo test -p hotl-types -p hotl-platform -p hotl-provider -p hotl-provider-anthropic -p hotl-provider-openai -p hotl-tools -p hotl-store -p hotl-context -p hotl-mcp -p hotl-engine -p hotl-testkit -p hotl --locked

  # Dependency vulnerability scan (security-evaluation H-08, SCA half). Runs
  # cargo-audit against the committed Cargo.lock. cargo-audit installs from
  # crates.io — the same trust root as the build — so this adds no new
  # third-party GitHub Action to the supply chain.
  #
  # The other half of H-08 (pin actions by commit SHA rather than mutable tag)
  # is intentionally left to Dependabot: resolving each action's current SHA
  # needs network access this repo's authors do the pin from, and Dependabot
  # keeps SHAs current after. Tracked in the evaluation response.
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies
        run: cargo audit --deny warnings
